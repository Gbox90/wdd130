<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Dry Oar White Water Rafting for reservations, questions, trip information, and customer support.">
    <meta name="author" content="Greisa Cajas">
    <title>Contact Us | Dry Oar White Water Rafting</title>
</head>

<body>
    <header>
        <img src="images/dryoarlogo.png" alt="Dry Oar Company Logo">

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Dry Oar: White Water Rafting Company</h1>

        <section class="company-info">
            <p>123 Main River Street</p>
            <p>Columbus, Georgia</p>
            <p>+1 999 999 9999</p>
            <p>info@dryoar.com</p>
        </section>

        <section class="contact-grid">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m12!1m8!1m3!1d4003.306392963996!2d-84.99694997227454!3d32.46290111632691!3m2!1i1024!2i768!4f13.1!2m1!1swhite%20water%20rafting%20florida!5e0!3m2!1sen!2sus!4v1781394077111!5m2!1sen!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>

            </div>

            <div class="contact-form">

                <form>

                    <div class="form-item">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-item">
                        <p>Message Purpose</p>

                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label>

                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>

                        <input type="radio" id="website" name="purpose" value="website">
                        <label for="website">Website Suggestion</label>

                        <br><br>

                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                    </div>

                    <div class="form-item">
                        <label>
                            <input type="checkbox" name="newsletter">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>

                </form>

            </div>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-profiles">

                <figure>
                    <img src="images/happyemployeesml2.jpg" alt="Lead River Guide">
                    <figcaption>Lead River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/happyemployeesml2.jpg" alt="Reservations Manager">
                    <figcaption>Reservations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/happyemployeesml2.jpg" alt="Operations Director">
                    <figcaption>Operations Director</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 🚣🏽‍♀️Dry Oar🚣🏽‍♀️ Greisa Cajas</p>

        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook.png" alt="facebook icon">
            </a>

            <a href="https://www.instagram.com">
                <img src="images/instagram.png" alt="instagram icon">
            </a>

            <a href="https://www.youtube.com">
                <img src="images/youtube.png" alt="youtube icon">
            </a>
        </nav>
    </footer>

</body>

</html>
